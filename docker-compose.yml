services:
  pipeline:
    build: .
    image: cooler-pipeline:latest
    container_name: cooler_pipeline

    environment:
      - RUNPOD_HOST=${RUNPOD_HOST}
      - RUNPOD_PORT=${RUNPOD_PORT}
      - RUNPOD_USER=${RUNPOD_USER:-root}
      - SSH_PASSWORD=${SSH_PASSWORD:-}
      - FRAME_INTERVAL_SECONDS=${FRAME_INTERVAL_SECONDS:-1.0}
      - VIDEO_SOURCE=${VIDEO_SOURCE:-local}

    volumes:
      - ${LOCAL_VIDEOS_DIR:-./videos}:/videos:ro
      - ${LOCAL_OUTPUT_DIR:-./pipeline_output}:/output
      - ${SSH_KEY_PATH:-~/.ssh/keys}:/ssh/keys:ro

    command: ${PIPELINE_ARGS:-}
